name: Build Binary

on:
  push:
    branches: [main]
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Install dependencies
        # This installs all deps including pytubefix and moviepy
        run: poetry install

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Determine binary extension
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXT=".exe"; fi
          
          # Run PyInstaller via Poetry to access the environment
          poetry run pyinstaller --onefile --collect-all imageio_ffmpeg --name "kleep-${{ matrix.os }}" src/kleep/main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kleep-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            dist/kleep-*